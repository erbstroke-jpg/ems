<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Not found &middot; EMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>body { background-color: #f8f9fa; }</style>
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="flex-grow-1 d-flex align-items-center py-5">
    <div class="container text-center">
        <i class="bi bi-search display-1 text-muted"></i>
        <h1 class="h2 mt-3">Page not found</h1>
        <p class="text-muted" th:text="${message} ?: 'The page you are looking for does not exist.'">message</p>
        <a th:href="@{/events}" class="btn btn-primary mt-3">Back to events</a>
    </div>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
