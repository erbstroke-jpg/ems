<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard &middot; EMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="flex-grow-1 py-5">
    <div class="container">
        <div class="row">
            <div class="col-12">
                <div class="card shadow-sm">
                    <div class="card-body p-4 p-md-5">
                        <h1 class="h2 mb-3">
                            <i class="bi bi-house"></i>
                            Welcome, <span sec:authentication="name">user</span>!
                        </h1>

                        <p class="text-muted">
                            You are signed in as
                            <strong sec:authentication="principal.authorities">[role]</strong>.
                        </p>

                        <hr>

                        <div sec:authorize="hasRole('ADMIN')">
                            <h2 class="h5">Administrator tools</h2>
                            <p>Manage categories: <a th:href="@{/admin/categories}">Categories</a></p>
                        </div>

                        <div sec:authorize="hasRole('ORGANIZER')">
                            <h2 class="h5">Organizer tools</h2>
                            <p>Create and manage your events in the
                                <a th:href="@{/organizer/events}">organizer area</a>.</p>
                        </div>

                        <div sec:authorize="hasRole('ATTENDEE')">
                            <h2 class="h5">Find events</h2>
                            <p>Browse and register for events in the
                                <a th:href="@{/events}">events catalog</a>.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

</body>
</html>
