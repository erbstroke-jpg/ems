<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create account &middot; EMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="flex-grow-1 d-flex align-items-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="auth-card">
                    <div class="auth-header">
                        <div class="auth-icon mx-auto"><i class="bi bi-person-plus-fill"></i></div>
                        <h1>Create account</h1>
                        <p>Join EMS to attend or organize events</p>
                    </div>
                    <div class="auth-body">
                        <form th:action="@{/register}" th:object="${userRegisterDto}"
                              method="post" novalidate>

                            <div class="mb-3">
                                <label class="form-label">Full name</label>
                                <input type="text" th:field="*{fullName}" class="form-control"
                                       th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
                                       placeholder="Erbol Aitbekov">
                                <div class="invalid-feedback" th:errors="*{fullName}">err</div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email address</label>
                                <input type="email" th:field="*{email}" class="form-control"
                                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                       placeholder="you@example.com">
                                <div class="invalid-feedback" th:errors="*{email}">err</div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" th:field="*{password}" class="form-control"
                                       th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                                       placeholder="Min 8 chars, letters + digits">
                                <div class="invalid-feedback" th:errors="*{password}">err</div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label d-block">I want to</label>
                                <div class="row g-2">
                                    <div class="col-6">
                                        <label style="cursor:pointer;border:1.5px solid var(--border);
                                                      border-radius:var(--radius-sm);padding:.75rem;
                                                      display:block;transition:var(--transition);"
                                               class="text-center hover-accent-border">
                                            <input class="form-check-input visually-hidden"
                                                   type="radio" th:field="*{role}" value="ATTENDEE">
                                            <i class="bi bi-ticket-perforated d-block mb-1"
                                               style="font-size:1.4rem;color:var(--accent);"></i>
                                            <span style="font-size:.85rem;font-weight:500;">Attend events</span>
                                        </label>
                                    </div>
                                    <div class="col-6">
                                        <label style="cursor:pointer;border:1.5px solid var(--border);
                                                      border-radius:var(--radius-sm);padding:.75rem;
                                                      display:block;transition:var(--transition);"
                                               class="text-center">
                                            <input class="form-check-input visually-hidden"
                                                   type="radio" th:field="*{role}" value="ORGANIZER">
                                            <i class="bi bi-megaphone d-block mb-1"
                                               style="font-size:1.4rem;color:var(--accent);"></i>
                                            <span style="font-size:.85rem;font-weight:500;">Organize events</span>
                                        </label>
                                    </div>
                                </div>
                                <div class="text-danger small mt-1"
                                     th:if="${#fields.hasErrors('role')}" th:errors="*{role}">err</div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                Create account <i class="bi bi-arrow-right ms-1"></i>
                            </button>
                        </form>

                        <p class="text-center mt-4 mb-0" style="font-size:.875rem;color:var(--text-muted);">
                            Already have an account?
                            <a th:href="@{/login}" style="color:var(--accent);font-weight:500;">Sign in</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
