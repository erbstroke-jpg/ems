<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register &middot; EMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="flex-grow-1 d-flex align-items-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-6">
                <div class="card shadow-sm">
                    <div class="card-body p-4 p-md-5">
                        <h1 class="h3 mb-4 text-center">
                            <i class="bi bi-person-plus"></i> Create account
                        </h1>

                        <form th:action="@{/register}"
                              th:object="${userRegisterDto}"
                              method="post" novalidate>

                            <!-- Full name -->
                            <div class="mb-3">
                                <label for="fullName" class="form-label">Full name</label>
                                <input type="text" id="fullName"
                                       th:field="*{fullName}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
                                       placeholder="Erbol Aitbekov">
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('fullName')}"
                                     th:errors="*{fullName}">
                                    Name error
                                </div>
                            </div>

                            <!-- Email -->
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" id="email"
                                       th:field="*{email}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                       placeholder="you@example.com">
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('email')}"
                                     th:errors="*{email}">
                                    Email error
                                </div>
                            </div>

                            <!-- Password -->
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" id="password"
                                       th:field="*{password}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                                       placeholder="At least 8 chars, letters + digits">
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('password')}"
                                     th:errors="*{password}">
                                    Password error
                                </div>
                                <div class="form-text">
                                    Must contain at least one letter and one digit.
                                </div>
                            </div>

                            <!-- Role -->
                            <div class="mb-4">
                                <label class="form-label d-block">I want to:</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio"
                                           id="roleAttendee"
                                           th:field="*{role}"
                                           value="ATTENDEE">
                                    <label class="form-check-label" for="roleAttendee">
                                        <i class="bi bi-ticket-perforated"></i>
                                        Attend events
                                    </label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio"
                                           id="roleOrganizer"
                                           th:field="*{role}"
                                           value="ORGANIZER">
                                    <label class="form-check-label" for="roleOrganizer">
                                        <i class="bi bi-megaphone"></i>
                                        Organize events
                                    </label>
                                </div>
                                <div class="text-danger small mt-1"
                                     th:if="${#fields.hasErrors('role')}"
                                     th:errors="*{role}">
                                    Role error
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 mb-3">
                                Create account
                            </button>
                        </form>

                        <p class="text-center mb-0 text-muted">
                            Already have an account?
                            <a th:href="@{/login}">Sign in</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

</body>
</html>
