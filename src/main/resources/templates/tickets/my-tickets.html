<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My tickets &middot; EMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .ticket-card { border-left: 4px solid #0d6efd; }
        .ticket-card.cancelled { border-left-color: #dc3545; opacity: 0.7; }
        .ticket-card.used { border-left-color: #6c757d; }
        .ticket-code {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.8rem;
            background: #f1f3f5;
            padding: 4px 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="flex-grow-1 py-5">
    <div class="container">

        <div th:if="${successMessage}"
             class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle"></i>
            <span th:text="${successMessage}">msg</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}"
             class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-circle"></i>
            <span th:text="${errorMessage}">msg</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <h1 class="h3 mb-4">
            <i class="bi bi-ticket-perforated"></i> My tickets
        </h1>

        <div th:if="${#lists.isEmpty(tickets)}" class="card shadow-sm">
            <div class="card-body text-center py-5">
                <i class="bi bi-ticket display-4 text-muted"></i>
                <p class="mt-3 mb-2 text-muted">You don't have any tickets yet.</p>
                <a th:href="@{/events}" class="btn btn-primary">Browse events</a>
            </div>
        </div>

        <div class="row g-3" th:unless="${#lists.isEmpty(tickets)}">
            <div class="col-md-6" th:each="ticket : ${tickets}">
                <div class="card shadow-sm ticket-card"
                     th:classappend="${ticket.status.name() == 'CANCELLED'} ? 'cancelled' :
                                     (${ticket.status.name() == 'USED'} ? 'used' : '')">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h5 class="card-title mb-0" th:text="${ticket.event.title}">Event</h5>
                            <span class="badge"
                                  th:classappend="${ticket.status.name() == 'ACTIVE'} ? 'bg-success' :
                                                  (${ticket.status.name() == 'CANCELLED'} ? 'bg-danger' : 'bg-secondary')"
                                  th:text="${ticket.status}">ACTIVE</span>
                        </div>

                        <p class="text-muted small mb-2">
                            <i class="bi bi-tag"></i>
                            <span th:text="${ticket.event.category.name}">Category</span>
                        </p>
                        <p class="text-muted small mb-2">
                            <i class="bi bi-clock"></i>
                            <span th:text="${#temporals.format(ticket.event.startAt, 'dd MMM yyyy, HH:mm')}">date</span>
                        </p>
                        <p class="text-muted small mb-3">
                            <i class="bi bi-geo-alt"></i>
                            <span th:text="${ticket.event.location}">location</span>
                        </p>

                        <p class="small mb-3">
                            <span class="text-muted">Ticket code:</span>
                            <span class="ticket-code" th:text="${ticket.code}">code</span>
                        </p>

                        <div class="d-flex gap-2">
                            <a th:href="@{|/events/${ticket.event.id}|}"
                               class="btn btn-sm btn-outline-secondary">
                                View event
                            </a>
                            <form th:action="@{|/my-tickets/${ticket.id}/cancel|}"
                                  method="post" class="d-inline"
                                  th:if="${ticket.status.name() == 'ACTIVE'}"
                                  onsubmit="return confirm('Cancel this ticket?');">
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    Cancel ticket
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

</body>
</html>
