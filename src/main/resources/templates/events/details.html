<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${event.title} + ' · EMS'">Event</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="flex-grow-1 py-5">
    <div class="container">

        <a th:href="@{/events}" class="btn btn-link px-0 mb-4">
            <i class="bi bi-arrow-left me-1"></i> Back to events
        </a>

        <div class="row g-4">
            <!-- Left: content -->
            <div class="col-lg-8">
                <div class="event-hero mb-4"
                     th:classappend="${event.coverImageUrl != null} ? 'with-image'"
                     th:style="${event.coverImageUrl != null} ? 'background-image:url(' + ${event.coverImageUrl} + ')' : ''">
                    <i th:if="${event.coverImageUrl == null}" class="bi bi-calendar2-week"></i>
                </div>

                <div class="event-category mb-2" th:text="${event.categoryName}">Category</div>
                <h1 style="font-size:1.75rem;font-weight:700;letter-spacing:-.03em;" th:text="${event.title}">Title</h1>
                <p style="color:var(--text-secondary);font-size:.9rem;" class="mt-1 mb-4">
                    Organized by <strong th:text="${event.organizerName}">Org</strong>
                </p>

                <hr class="divider">

                <h2 style="font-size:1rem;font-weight:600;margin:1.5rem 0 .75rem;">About this event</h2>
                <p style="color:var(--text-secondary);white-space:pre-wrap;line-height:1.7;"
                   th:text="${event.description}">desc</p>
            </div>

            <!-- Right: sidebar -->
            <div class="col-lg-4">
                <div class="sidebar-card sticky-top" style="top:1.5rem;">
                    <div class="sidebar-card-header">
                        <span th:if="${!event.free}">
                            <i class="bi bi-tag me-1"></i>
                            <span th:text="${event.price + ' KGS'}">price</span>
                        </span>
                        <span th:if="${event.free}">
                            <i class="bi bi-gift me-1"></i> Free entry
                        </span>
                    </div>

                    <div class="p-3">

                        <div th:if="${successMessage}" class="alert alert-success mb-3 py-2 px-3"
                             style="font-size:.85rem;" th:text="${successMessage}">msg</div>
                        <div th:if="${errorMessage}" class="alert alert-danger mb-3 py-2 px-3"
                             style="font-size:.85rem;" th:text="${errorMessage}">msg</div>

                        <div class="meta-row">
                            <div class="meta-icon"><i class="bi bi-calendar3"></i></div>
                            <div>
                                <div class="meta-label">Starts</div>
                                <div class="meta-value" th:text="${#temporals.format(event.startAt, 'dd MMM yyyy, HH:mm')}">date</div>
                            </div>
                        </div>
                        <div class="meta-row">
                            <div class="meta-icon"><i class="bi bi-calendar2-check"></i></div>
                            <div>
                                <div class="meta-label">Ends</div>
                                <div class="meta-value" th:text="${#temporals.format(event.endAt, 'dd MMM yyyy, HH:mm')}">date</div>
                            </div>
                        </div>
                        <div class="meta-row">
                            <div class="meta-icon"><i class="bi bi-geo-alt"></i></div>
                            <div>
                                <div class="meta-label">Location</div>
                                <div class="meta-value" th:text="${event.location}">loc</div>
                            </div>
                        </div>
                        <div class="meta-row">
                            <div class="meta-icon"><i class="bi bi-people"></i></div>
                            <div>
                                <div class="meta-label">Availability</div>
                                <div class="meta-value" th:if="${!event.soldOut}">
                                    <span th:text="${event.seatsRemaining}">10</span> of
                                    <span th:text="${event.capacity}">50</span> seats left
                                </div>
                                <div class="meta-value" th:if="${event.soldOut}" style="color:#DC2626;">
                                    Sold out
                                </div>
                            </div>
                        </div>

                        <div class="mt-3">
                            <div sec:authorize="!isAuthenticated()">
                                <a th:href="@{/login}" class="btn btn-primary w-100">
                                    Sign in to register
                                </a>
                            </div>
                            <div sec:authorize="hasRole('ATTENDEE')">
                                <form th:action="@{|/events/${event.id}/register|}" method="post"
                                      th:if="${!event.soldOut}">
                                    <button type="submit" class="btn btn-primary w-100">
                                        <i class="bi bi-ticket-perforated me-1"></i> Register
                                    </button>
                                </form>
                                <button th:if="${event.soldOut}" class="btn btn-outline-secondary w-100" disabled>
                                    <i class="bi bi-x-circle me-1"></i> Sold out
                                </button>
                            </div>
                            <div sec:authorize="hasRole('ORGANIZER') or hasRole('ADMIN')">
                                <p class="text-center mb-0" style="font-size:.82rem;color:var(--text-muted);">
                                    <i class="bi bi-info-circle me-1"></i>Only attendees can register.
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
