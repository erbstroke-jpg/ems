<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events &middot; EMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="flex-grow-1 py-5">
    <div class="container">

        <!-- Hero header -->
        <div class="mb-5">
            <h1 class="page-title"><i class="bi bi-calendar-event-fill"></i> Upcoming events</h1>
            <p class="page-subtitle">Discover and register for events happening near you.</p>
        </div>

        <!-- Empty state -->
        <div th:if="${events.totalElements == 0}" class="card">
            <div class="empty-state">
                <i class="bi bi-calendar-x"></i>
                <p>No published events yet. Check back soon!</p>
            </div>
        </div>

        <!-- Events grid -->
        <div class="row g-4" th:if="${events.totalElements > 0}">
            <div class="col-md-6 col-lg-4" th:each="event : ${events.content}">
                <div class="event-card h-100">
                    <div class="event-cover"
                         th:classappend="${event.coverImageUrl != null} ? 'with-image'"
                         th:style="${event.coverImageUrl != null} ? 'background-image:url(' + ${event.coverImageUrl} + ')' : ''">
                        <i th:if="${event.coverImageUrl == null}" class="bi bi-calendar2-week"></i>

                        <span class="price-tag badge"
                              th:classappend="${event.free} ? 'bg-success' : 'bg-primary'"
                              th:text="${event.free ? 'Free' : event.price + ' KGS'}">Free</span>
                    </div>

                    <div class="event-body">
                        <div class="event-category" th:text="${event.categoryName}">Category</div>
                        <h3 class="event-title" th:text="${event.title}">Title</h3>
                        <p class="event-desc" th:text="${event.shortDescription}">desc</p>

                        <div class="event-meta">
                            <span><i class="bi bi-clock"></i><span th:text="${#temporals.format(event.startAt, 'dd MMM yyyy, HH:mm')}">date</span></span>
                            <span><i class="bi bi-geo-alt"></i><span th:text="${event.location}">location</span></span>
                            <span><i class="bi bi-people"></i><span th:text="${event.capacity + ' seats'}">seats</span></span>
                        </div>

                        <a th:href="@{|/events/${event.id}|}" class="btn btn-primary w-100">
                            View details <i class="bi bi-arrow-right ms-1"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pagination -->
        <nav th:if="${totalPages > 1}" class="mt-5">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/events(page=${currentPage - 1})}">
                        <i class="bi bi-chevron-left"></i>
                    </a>
                </li>
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/events(page=${i})}" th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/events(page=${currentPage + 1})}">
                        <i class="bi bi-chevron-right"></i>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
