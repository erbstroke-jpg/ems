<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events &middot; EMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .event-cover {
            height: 160px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.6);
            font-size: 3rem;
        }
        .event-cover.with-image {
            background-size: cover;
            background-position: center;
        }
        .price-badge {
            position: absolute;
            top: 12px;
            right: 12px;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="flex-grow-1 py-5">
    <div class="container">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h3 mb-1">
                    <i class="bi bi-calendar-event"></i> Upcoming events
                </h1>
                <p class="text-muted mb-0 small">
                    Browse and register for events happening soon.
                </p>
            </div>
        </div>

        <div th:if="${events.totalElements == 0}" class="card shadow-sm">
            <div class="card-body text-center py-5">
                <i class="bi bi-calendar-x display-4 text-muted"></i>
                <p class="mt-3 mb-0 text-muted">No published events yet. Check back soon!</p>
            </div>
        </div>

        <div class="row g-4" th:if="${events.totalElements > 0}">
            <div class="col-md-6 col-lg-4" th:each="event : ${events.content}">
                <div class="card shadow-sm h-100 position-relative">

                    <div class="event-cover"
                         th:classappend="${event.coverImageUrl != null} ? 'with-image'"
                         th:style="${event.coverImageUrl != null}
                                   ? 'background-image: url(' + ${event.coverImageUrl} + ')'
                                   : ''">
                        <i th:if="${event.coverImageUrl == null}" class="bi bi-calendar2-week"></i>
                    </div>

                    <span class="badge price-badge"
                          th:classappend="${event.free} ? 'bg-success' : 'bg-primary'"
                          th:text="${event.free ? 'Free' : event.price + ' KGS'}">price</span>

                    <div class="card-body d-flex flex-column">
                        <p class="text-muted small mb-1">
                            <i class="bi bi-tag"></i>
                            <span th:text="${event.categoryName}">Category</span>
                        </p>
                        <h5 class="card-title" th:text="${event.title}">Title</h5>
                        <p class="card-text text-muted small flex-grow-1"
                           th:text="${event.shortDescription}">desc</p>

                        <div class="text-muted small mb-3">
                            <div class="mb-1">
                                <i class="bi bi-clock"></i>
                                <span th:text="${#temporals.format(event.startAt, 'dd MMM yyyy, HH:mm')}">date</span>
                            </div>
                            <div>
                                <i class="bi bi-geo-alt"></i>
                                <span th:text="${event.location}">location</span>
                            </div>
                        </div>

                        <a th:href="@{|/events/${event.id}|}"
                           class="btn btn-outline-primary mt-auto">
                            View details
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pagination -->
        <nav th:if="${totalPages > 1}" class="mt-5">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/events(page=${currentPage - 1})}">Previous</a>
                </li>
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/events(page=${i})}" th:text="${i + 1}">1</a>
                </li>
                <li class="page-item"
                    th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/events(page=${currentPage + 1})}">Next</a>
                </li>
            </ul>
        </nav>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

</body>
</html>
