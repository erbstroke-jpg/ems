<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${formMode == 'create' ? 'New event' : 'Edit event'} + ' · EMS'">Event form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="flex-grow-1 py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <a th:href="@{/organizer/events}" class="btn btn-link mb-2 px-0">
                    <i class="bi bi-arrow-left"></i> Back to my events
                </a>

                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h1 class="h4 mb-4">
                            <i class="bi bi-calendar-plus"></i>
                            <span th:text="${formMode == 'create' ? 'New event' : 'Edit event'}">Form</span>
                        </h1>

                        <form th:with="actionUrl=${formMode == 'create'
                                    ? '/organizer/events/new'
                                    : '/organizer/events/' + eventId + '/edit'}"
                              th:action="@{${actionUrl}}"
                              th:object="${eventFormDto}"
                              method="post"
                              enctype="multipart/form-data"
                              novalidate>


                            <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
                                <p th:each="err : ${#fields.globalErrors()}"
                                   th:text="${err}" class="mb-0">error</p>
                            </div>

                            <div class="mb-3">
                                <label for="title" class="form-label">Title</label>
                                <input type="text" id="title" th:field="*{title}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"
                                       placeholder="Bishkek Java Meetup #5">
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('title')}"
                                     th:errors="*{title}">err</div>
                            </div>

                            <div class="mb-3">
                                <label for="description" class="form-label">Description</label>
                                <textarea id="description" th:field="*{description}"
                                          class="form-control" rows="5"
                                          th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"
                                          placeholder="Tell attendees what to expect..."></textarea>
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('description')}"
                                     th:errors="*{description}">err</div>
                            </div>

                            <div class="row g-3">
                                <div class="col-md-6 mb-3">
                                    <label for="categoryId" class="form-label">Category</label>
                                    <select id="categoryId" th:field="*{categoryId}"
                                            class="form-select"
                                            th:classappend="${#fields.hasErrors('categoryId')} ? 'is-invalid'">
                                        <option value="">— select category —</option>
                                        <option th:each="cat : ${categories}"
                                                th:value="${cat.id}"
                                                th:text="${cat.name}">Cat</option>
                                    </select>
                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('categoryId')}"
                                         th:errors="*{categoryId}">err</div>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label for="location" class="form-label">Location</label>
                                    <input type="text" id="location" th:field="*{location}"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('location')} ? 'is-invalid'"
                                           placeholder="Ala-Too University, room 312">
                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('location')}"
                                         th:errors="*{location}">err</div>
                                </div>
                            </div>

                            <div class="row g-3">
                                <div class="col-md-6 mb-3">
                                    <label for="startAt" class="form-label">Start</label>
                                    <input type="datetime-local" id="startAt"
                                           th:field="*{startAt}"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('startAt')} ? 'is-invalid'">
                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('startAt')}"
                                         th:errors="*{startAt}">err</div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="endAt" class="form-label">End</label>
                                    <input type="datetime-local" id="endAt"
                                           th:field="*{endAt}"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('endAt')} ? 'is-invalid'">
                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('endAt')}"
                                         th:errors="*{endAt}">err</div>
                                </div>
                            </div>

                            <div class="row g-3">
                                <div class="col-md-6 mb-3">
                                    <label for="capacity" class="form-label">Capacity</label>
                                    <input type="number" id="capacity" th:field="*{capacity}"
                                           class="form-control" min="1"
                                           th:classappend="${#fields.hasErrors('capacity')} ? 'is-invalid'"
                                           placeholder="100">
                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('capacity')}"
                                         th:errors="*{capacity}">err</div>
                                </div>
                                <div class="col-md-6 mb-4">
                                    <label for="price" class="form-label">Price (KGS)</label>
                                    <input type="number" step="0.01" min="0"
                                           id="price" th:field="*{price}"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'"
                                           placeholder="0 for free">
                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('price')}"
                                         th:errors="*{price}">err</div>
                                </div>
                                <div class="mb-4">
                                    <label for="coverImage" class="form-label">
                                        Cover image <span class="text-muted">(optional, max 5 MB)</span>
                                    </label>
                                    <input type="file" id="coverImage" name="coverImage"
                                           class="form-control"
                                           accept="image/jpeg,image/png,image/webp,image/gif">
                                    <div class="form-text">JPEG, PNG, WebP, or GIF.</div>
                                </div>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <span th:text="${formMode == 'create' ? 'Create' : 'Save changes'}">Submit</span>
                                </button>
                                <a th:href="@{/organizer/events}"
                                   class="btn btn-outline-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

</body>
</html>
