<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Attendees &middot; EMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .ticket-code { font-family: 'Consolas', 'Monaco', monospace; font-size: 0.8rem; }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="flex-grow-1 py-5">
    <div class="container">
        <a th:href="@{/organizer/events}" class="btn btn-link mb-3 px-0">
            <i class="bi bi-arrow-left"></i> Back to my events
        </a>

        <h1 class="h4 mb-1">
            <i class="bi bi-people"></i> Attendees
        </h1>
        <p class="text-muted mb-4">
            <strong th:text="${event.title}">Event</strong> &middot;
            <span th:text="${#temporals.format(event.startAt, 'dd MMM yyyy, HH:mm')}">date</span>
        </p>

        <div class="row g-2 mb-4">
            <div class="col-auto">
                <div class="card shadow-sm">
                    <div class="card-body py-2">
                        <small class="text-muted">Registered</small>
                        <div class="fs-5 fw-bold" th:text="${#lists.size(tickets)}">0</div>
                    </div>
                </div>
            </div>
            <div class="col-auto">
                <div class="card shadow-sm">
                    <div class="card-body py-2">
                        <small class="text-muted">Capacity</small>
                        <div class="fs-5 fw-bold" th:text="${event.capacity}">0</div>
                    </div>
                </div>
            </div>
            <div class="col-auto">
                <div class="card shadow-sm">
                    <div class="card-body py-2">
                        <small class="text-muted">Seats remaining</small>
                        <div class="fs-5 fw-bold" th:text="${seatsRemaining}">0</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Ticket code</th>
                        <th>Registered</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(tickets)}">
                        <td colspan="5" class="text-center text-muted py-4">
                            No attendees yet.
                        </td>
                    </tr>
                    <tr th:each="ticket, iter : ${tickets}">
                        <td th:text="${iter.count}">1</td>
                        <td th:text="${ticket.attendee.fullName}">name</td>
                        <td th:text="${ticket.attendee.email}">email</td>
                        <td><span class="ticket-code" th:text="${ticket.code}">code</span></td>
                        <td class="text-muted small"
                            th:text="${#temporals.format(ticket.createdAt, 'dd MMM, HH:mm')}">date</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
