<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in &middot; EMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="flex-grow-1 d-flex align-items-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="auth-card">
                    <div class="auth-header">
                        <div class="auth-icon mx-auto"><i class="bi bi-calendar-event-fill"></i></div>
                        <h1>Welcome back</h1>
                        <p>Sign in to your EMS account</p>
                    </div>
                    <div class="auth-body">

                        <div th:if="${param.error}" class="alert alert-danger mb-3">
                            <i class="bi bi-exclamation-circle me-2"></i>Invalid email or password.
                        </div>
                        <div th:if="${param.logout}" class="alert alert-success mb-3">
                            <i class="bi bi-check-circle me-2"></i>You have been signed out.
                        </div>
                        <div th:if="${param.registered}" class="alert alert-success mb-3">
                            <i class="bi bi-check-circle me-2"></i>Account created. Sign in below.
                        </div>

                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label for="username" class="form-label">Email address</label>
                                <input type="email" id="username" name="username"
                                       class="form-control" required autofocus
                                       placeholder="you@example.com">
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" id="password" name="password"
                                       class="form-control" required
                                       placeholder="••••••••">
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                Sign in <i class="bi bi-arrow-right ms-1"></i>
                            </button>
                        </form>

                        <p class="text-center mt-4 mb-0" style="font-size:.875rem;color:var(--text-muted);">
                            New to EMS?
                            <a th:href="@{/register}" style="color:var(--accent);font-weight:500;">Create account</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
