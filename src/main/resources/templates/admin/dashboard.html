<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin dashboard &middot; EMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="flex-grow-1 py-5">
    <div class="container">
        <h1 class="h3 mb-4">
            <i class="bi bi-speedometer2"></i> Admin dashboard
        </h1>

        <div class="row g-3 mb-5">
            <div class="col-md-4 col-lg-3">
                <div class="card shadow-sm stat-card">
                    <div class="card-body">
                        <p class="text-muted small mb-1">Total users</p>
                        <h3 class="mb-0" th:text="${stats.totalUsers}">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4 col-lg-3">
                <div class="card shadow-sm stat-card">
                    <div class="card-body">
                        <p class="text-muted small mb-1">Total events</p>
                        <h3 class="mb-0" th:text="${stats.totalEvents}">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4 col-lg-3">
                <div class="card shadow-sm stat-card">
                    <div class="card-body">
                        <p class="text-muted small mb-1">Published events</p>
                        <h3 class="mb-0" th:text="${stats.publishedEvents}">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4 col-lg-3">
                <div class="card shadow-sm stat-card">
                    <div class="card-body">
                        <p class="text-muted small mb-1">Active tickets</p>
                        <h3 class="mb-0" th:text="${stats.activeTickets}">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4 col-lg-3">
                <div class="card shadow-sm stat-card">
                    <div class="card-body">
                        <p class="text-muted small mb-1">Categories</p>
                        <h3 class="mb-0" th:text="${stats.totalCategories}">0</h3>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-3">
            <div class="col-md-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5><i class="bi bi-people"></i> Users</h5>
                        <p class="text-muted small">Manage user accounts and roles.</p>
                        <a th:href="@{/admin/users}" class="btn btn-outline-primary btn-sm">Open</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5><i class="bi bi-tags"></i> Categories</h5>
                        <p class="text-muted small">Manage event categories.</p>
                        <a th:href="@{/admin/categories}" class="btn btn-outline-primary btn-sm">Open</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
