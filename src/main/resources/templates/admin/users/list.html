<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Users &middot; EMS Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="flex-grow-1 py-5">
    <div class="container">

        <div th:if="${successMessage}"
             class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successMessage}">msg</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}"
             class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorMessage}">msg</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <h1 class="h3 mb-4">
            <i class="bi bi-people"></i> Users
        </h1>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>Email</th>
                        <th>Name</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th style="width: 180px;">Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.email}">email</td>
                        <td th:text="${user.fullName}">name</td>
                        <td>
                            <span class="badge bg-secondary" th:text="${user.userType}">ROLE</span>
                        </td>
                        <td>
                            <span class="badge bg-success" th:if="${user.active}">Active</span>
                            <span class="badge bg-danger" th:unless="${user.active}">Inactive</span>
                        </td>
                        <td>
                            <form th:if="${user.userType.name() != 'ADMIN'}"
                                  th:action="@{|/admin/users/${user.id}/toggle-active|}"
                                  method="post"
                                  onsubmit="return confirm('Toggle this user\'s status?');">
                                <button type="submit"
                                        class="btn btn-sm"
                                        th:classappend="${user.active} ? 'btn-outline-danger' : 'btn-outline-success'">
                                    <span th:text="${user.active ? 'Deactivate' : 'Activate'}">x</span>
                                </button>
                            </form>
                            <span th:if="${user.userType.name() == 'ADMIN'}"
                                  class="text-muted small">Protected</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
