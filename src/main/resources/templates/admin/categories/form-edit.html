<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit category &middot; EMS Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="flex-grow-1 py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <a th:href="@{/admin/categories}" class="btn btn-link mb-2 px-0">
                    <i class="bi bi-arrow-left"></i> Back to categories
                </a>

                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h1 class="h4 mb-4">
                            <i class="bi bi-pencil-square"></i> Edit category
                        </h1>

                        <form th:action="@{|/admin/categories/${categoryId}/edit|}"
                              th:object="${categoryUpdateDto}"
                              method="post" novalidate>

                            <div class="mb-3">
                                <label for="name" class="form-label">Name</label>
                                <input type="text" id="name" th:field="*{name}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('name')}"
                                     th:errors="*{name}">error</div>
                            </div>

                            <div class="mb-4">
                                <label for="description" class="form-label">
                                    Description <span class="text-muted">(optional)</span>
                                </label>
                                <textarea id="description" th:field="*{description}"
                                          rows="3" class="form-control"
                                          th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"></textarea>
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('description')}"
                                     th:errors="*{description}">error</div>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">
                                    Save changes
                                </button>
                                <a th:href="@{/admin/categories}"
                                   class="btn btn-outline-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

</body>
</html>
