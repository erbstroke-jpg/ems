# ====== Application ======
spring.application.name=ems
server.port=8080

# ====== Database ======
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/ems_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
spring.datasource.username=${DATABASE_USERNAME:ems_user}
spring.datasource.password=${DATABASE_PASSWORD:ems_pass_2026}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ====== JPA / Hibernate ======
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ====== Logging ======
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

# ====== Thymeleaf ======
spring.thymeleaf.cache=false

# ====== File Upload ======
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads

# Database ? Railway injected vars or local defaults
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/ems_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
spring.datasource.username=${DATABASE_USERNAME:ems_user}
spring.datasource.password=${DATABASE_PASSWORD:ems_pass_2026}

# Upload dir
app.upload.dir=${UPLOAD_DIR:./uploads}

# Port
server.port=${PORT:8080}
